<div class="auth-page">
    <div class="auth-card">
      <h2>Zaboravljena lozinka</h2>
      <p>Unesite korisničko ime ili email i poslaćemo vam link za reset</p>
  
      @if (message) {
        <div class="alert alert-success">{{ message }}</div>
      }
      @if (error) {
        <div class="alert alert-error">{{ error }}</div>
      }
  
      <div class="form-group">
        <label>Korisničko ime ili email</label>
        <input class="form-control" [(ngModel)]="usernameOrEmail" placeholder="Unesite korisničko ime ili email">
      </div>
  
      <button class="btn btn-primary btn-full" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Slanje...' : 'Pošalji link' }}
      </button>
  
      <div class="auth-links">
        <a routerLink="/login">Nazad na prijavu</a>
      </div>
    </div>
  </div>
